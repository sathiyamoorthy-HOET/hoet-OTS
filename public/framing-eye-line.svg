<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="900" height="1200" font-family="'Manrope','Inter',system-ui,sans-serif">
  <rect width="900" height="1200" fill="#0b0b14"/>

  <!-- frame border -->
  <rect x="20" y="20" width="860" height="1160" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.18"/>

  <!-- rule-of-thirds grid -->
  <g stroke="#ffffff" stroke-opacity="0.10" stroke-width="2">
    <line x1="320" y1="20" x2="320" y2="1180"/>
    <line x1="600" y1="20" x2="600" y2="1180"/>
    <line x1="20" y1="800" x2="880" y2="800"/>
  </g>

  <!-- subject silhouette -->
  <g>
    <!-- shoulders -->
    <path d="M250 1180 C250 900 330 720 450 720 C570 720 650 900 650 1180 Z" fill="#475569" fill-opacity="0.55"/>
    <!-- neck -->
    <rect x="410" y="600" width="80" height="120" rx="20" fill="#475569" fill-opacity="0.55"/>
    <!-- head -->
    <ellipse cx="450" cy="470" rx="130" ry="155" fill="#e2e8f0"/>
  </g>

  <!-- eyes ON the upper-third line -->
  <line x1="20" y1="430" x2="880" y2="430" stroke="#22d3ee" stroke-width="3" stroke-dasharray="10 7"/>
  <circle cx="405" cy="430" r="13" fill="#0b0b14" stroke="#22d3ee" stroke-width="3"/>
  <circle cx="495" cy="430" r="13" fill="#0b0b14" stroke="#22d3ee" stroke-width="3"/>
  <text x="40" y="412" fill="#67e8f9" font-size="26" font-weight="700" letter-spacing="2">EYE LINE · UPPER THIRD</text>

  <!-- headroom marker -->
  <g stroke="#a78bfa" stroke-width="2.5">
    <line x1="760" y1="40" x2="760" y2="315"/>
    <line x1="748" y1="40" x2="772" y2="40"/>
    <line x1="748" y1="315" x2="772" y2="315"/>
  </g>
  <text x="700" y="185" fill="#c4b5fd" font-size="24" font-weight="600" text-anchor="middle" transform="rotate(-90 700 185)">Small headroom</text>

  <!-- labels -->
  <g>
    <rect x="40" y="900" width="300" height="120" rx="12" fill="#0b0b14" stroke="#34d399" stroke-opacity="0.5"/>
    <text x="60" y="945" fill="#34d399" font-size="22" font-weight="800">✓ CORRECT FRAMING</text>
    <text x="60" y="980" fill="#cbd5e1" font-size="22">Head high · eyes on the</text>
    <text x="60" y="1008" fill="#cbd5e1" font-size="22">upper-third line</text>
  </g>

  <text x="450" y="1150" fill="#94a3b8" font-size="20" text-anchor="middle">Talking-head framing reference · keep the face inside the safe zone</text>
</svg>
